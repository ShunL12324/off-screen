<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>off-screen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <button class="ctrl" id="pick" data-icon="crop" title="Pick window region"></button>
        <button class="ctrl" id="reselect" data-icon="rotate-cw" title="Reselect region" hidden></button>

        <div class="spacer"></div>

        <div class="group opacity-group" title="Opacity (⌘⇧↑/↓)">
          <span class="ctrl ghost" data-icon="droplet"></span>
          <input id="opacity" type="range" min="20" max="100" value="85" />
          <span id="opacityVal">85</span>
        </div>

        <div class="group">
          <button class="ctrl" id="clickthrough" data-icon="mouse-pointer-click" title="Click-through (⌘⇧M)"></button>
          <button class="ctrl" id="pin" data-icon="pin" title="Always on top"></button>
          <button class="ctrl" id="hide" data-icon="minus" title="Hide (⌘⇧H)"></button>
          <button class="ctrl danger" id="close" data-icon="x" title="Close"></button>
        </div>
      </div>

      <div id="stage">
        <div id="empty">
          <button id="empty-cta" type="button">
            <span data-icon="crop"></span>
            <span class="empty-cta-label">Pick a window</span>
          </button>
          <div class="empty-sub">macOS will show a window picker · ⌘⇧M to toggle click-through</div>
        </div>

        <video id="src-video" autoplay muted playsinline hidden></video>

        <div id="crop-overlay" hidden>
          <div id="crop-rect">
            <span id="crop-dim"></span>
          </div>
          <div class="hint">Drag to select region · Enter to confirm · Esc to redo</div>
        </div>

        <div id="mirror-frame" hidden>
          <video id="cropped-video" autoplay muted playsinline></video>
        </div>
      </div>
    </div>
    <script src="icons.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
