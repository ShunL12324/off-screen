<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" fill="none">
  <!--
    off-screen app icon (with background plate).
    Off-white squircle plate, iridescent mirror glyph centered on top.
  -->

  <defs>
    <!-- Plate: very subtle warm-to-cool top-down gradient for quiet depth -->
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FBFAF8"/>
      <stop offset="100%" stop-color="#ECEBE7"/>
    </linearGradient>

    <!-- Iridescent gradient on the mirror glyph -->
    <linearGradient id="mirror" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FF8FB1"/>
      <stop offset="55%" stop-color="#A66BF5"/>
      <stop offset="100%" stop-color="#5B5BF0"/>
    </linearGradient>

  </defs>

  <!-- ========== PLATE ========== -->
  <!-- Flat square; the OS / build pipeline applies the squircle mask. -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#plate)"/>

  <!-- ========== GLYPH ========== -->
  <!-- Source window: outline -->
  <rect x="160" y="160" width="560" height="560" rx="120" ry="120"
        fill="none" stroke="#1F1B2E" stroke-width="36"/>

  <!-- Mirror window: solid iridescent -->
  <rect x="304" y="304" width="560" height="560" rx="120" ry="120"
        fill="url(#mirror)"/>
</svg>
